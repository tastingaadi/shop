<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Store</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #0f172a;
    color: white;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
    color: #38bdf8;
}

.sidebar a {
    display: block;
    color: #cbd5f5;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 5px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: #1e293b;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Header */
.header {
    font-size: 24px;
    margin-bottom: 20px;
}

/* Cards */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    padding: 20px;
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(56,189,248,0.3);
}

.card h3 {
    margin-bottom: 10px;
}

.price {
    font-size: 22px;
    margin: 10px 0;
    color: #38bdf8;
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px 15px;
    color: black;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>Store</h2>
    <a href="#">Classic</a>
    <a href="#">Premium</a>
    <a href="#">Coins</a>
    <a href="#">Keys</a>
</div>

<div class="main">
    <div class="header">Classic Category</div>

```
<div class="grid">

    <div class="card">
        <h3>Classic Rank</h3>
        <p>Basic perks & commands</p>

        <button>Purchase</button>
    </div>

    <div class="card">
        <h3>Starter Kit</h3>

    <div class="card">
        <h3>Coins Pack</h3>

    <div class="card">
        <h3>VIP Rank</h3>
        <p>Extra perks & boosts</p>
        <div class="price">₹299</div>
        <button>Purchase</button>
    </div>

</div>
```

</div>

</body>
</html>
